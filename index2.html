<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Program</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        .container {
            width: 90%;
            max-width: 1200px;
        }
        .drawing-section {
            margin-bottom: 40px;
            width: 100%;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #fff;
        }
        .showcase-section {
            width: 100%;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .art-card {
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .art-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }
        h2 {
            color: #222;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .description {
            background: #e9e9e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>Creative Artist Suite</h1>
        <p>A dedicated space for digital sketching and art curation.</p>
    </header>

    <div class="container">
        <section class="drawing-section">
            <h2>Canvas</h2>
            <div class="description">
                Use the interactive tool below to create your masterpiece.
            </div>
            <iframe src="https://htmlpreview.github.io/?https://github.com/RedstoneOutput/drawingthingy/blob/main/index.html" title="Drawing Application"></iframe>
        </section>

        <section class="showcase-section">
            <h2>Art Showcase</h2>
            <div class="gallery">
                <div class="art-card">
                    <img src="https://uploads.onecompiler.io/449x3z5za/44jh99jys/Spider%20piano.png" alt="Spider Piano">
                    <p style="text-align:center; font-size: 0.8em; margin-top: 10px;">Spider Piano Original</p>
                </div>
            </div>
        </section>
    </div>

</body>
</html>
